<div id="giscus-container"></div>
<script>
    function getGiscusTheme() {
        return document.body.getAttribute("data-md-color-scheme") === "slate" ? "dark" : "light";
    }
    function initGiscus() {
        var container = document.getElementById("giscus-container");
        if (!container) return;
        var script = document.createElement("script");
        script.src = "https://giscus.app/client.js";
        script.setAttribute("data-repo", "Ac-Wiki/Ac-Wiki");
        script.setAttribute("data-repo-id", "R_kgDONCnJnA");
        script.setAttribute("data-category", "Announcements");
        script.setAttribute("data-category-id", "DIC_kwDONCnJnM4Cjk4S");
        script.setAttribute("data-mapping", "title");
        script.setAttribute("data-strict", "0");
        script.setAttribute("data-reactions-enabled", "1");
        script.setAttribute("data-emit-metadata", "1");
        script.setAttribute("data-input-position", "top");
        script.setAttribute("data-theme", getGiscusTheme());
        script.setAttribute("data-lang", "zh-CN");
        script.setAttribute("data-loading", "lazy");
        script.crossOrigin = "anonymous";
        script.async = true;
        container.appendChild(script);
    }
    function switchGiscusTheme() {
        var iframe = document.querySelector("iframe.giscus-frame");
        if (!iframe) return;
        iframe.contentWindow.postMessage(
            { giscus: { setConfig: { theme: getGiscusTheme() } } },
            "https://giscus.app"
        );
    }
    document.addEventListener("DOMContentLoaded", initGiscus);
    document.addEventListener("click", function(e) {
        if (e.target.closest("[data-md-color-scheme]")) {
            setTimeout(switchGiscusTheme, 300);
        }
    });
</script>
